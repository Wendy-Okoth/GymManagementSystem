{% load static %}
<nav class="bg-[#161b22] border-b border-[#30363d] sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      
      <!-- Logo -->
      <a href="{% url 'home' %}" class="flex items-center space-x-3">
        <img src="{% static 'images/favicon.png' %}" alt="GymEncore Logo" class="h-9 w-9 object-contain">
        <span class="font-extrabold text-xl tracking-wider text-white">GYM<span class="text-lime-500">ENCORE</span></span>
      </a>

      <!-- Navigation Links with Spacing -->
      <div class="hidden md:flex items-center space-x-8 text-sm font-semibold tracking-wide">
        <a href="{% url 'home' %}" class="text-slate-300 hover:text-lime-400 transition-colors">Home</a>
        <a href="{% url 'about' %}" class="text-slate-300 hover:text-lime-400 transition-colors">About Us</a>
        <a href="{% url 'contact' %}" class="text-slate-300 hover:text-lime-400 transition-colors">Contact Us</a>
        
        {% if user.is_authenticated %}
          <a href="{% url 'profile' %}" class="text-slate-300 hover:text-lime-400 transition-colors">Profile</a>
          <a href="{% url 'logout' %}" class="text-rose-400 hover:text-rose-300 font-bold transition-colors">Logout</a>
        {% else %}
          <a href="{% url 'signup' %}" class="text-slate-300 hover:text-lime-400 transition-colors">Signup</a>
          <a href="{% url 'login' %}" class="bg-lime-500 hover:bg-lime-600 text-black font-bold px-4 py-2 rounded-lg transition-all shadow-lg shadow-lime-500/20">Login</a>
        {% endif %}
      </div>

    </div>
  </div>
</nav>
