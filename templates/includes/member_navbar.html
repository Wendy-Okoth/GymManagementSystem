{% load static %}
<nav class="bg-blue-700 text-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Brand Logo -->
      <a href="{% url 'member_dashboard' %}" class="flex items-center space-x-2">
        <img src="{% static 'images/trainer.png' %}" alt="Gym Icon" class="h-10 w-10 object-contain">
        <span class="font-bold text-lg tracking-wide">GymEncore</span>
      </a>

      <!-- Desktop Links -->
      <div class="hidden md:flex items-center space-x-6 font-medium text-sm">
        <a href="{% url 'member_dashboard' %}" class="hover:text-pink-300 transition-colors">Home</a>
        <a href="{% url 'profile' %}" class="hover:text-pink-300 transition-colors">Profile</a>
        <a href="{% url 'member_sessions' %}" class="hover:text-pink-300 transition-colors">Sessions</a>
        <a href="{% url 'feedback_list' %}" class="hover:text-pink-300 transition-colors">Feedback</a>

    <div id="member-menu" class="hidden md:hidden pb-4 space-y-2 font-medium border-t border-blue-600 pt-3">

      <a href="{% url 'feedback_list' %}" class="block px-3 py-2 rounded-md hover:bg-blue-800 transition-colors">Feedback</a>
      <a href="{% url 'member_payment' %}" class="block px-3 py-2 rounded-md hover:bg-blue-800 transition-colors">Payment</a>
      <a href="{% url 'logout' %}" class="block px-3 py-2 rounded-md text-rose-300 hover:bg-blue-800 hover:text-rose-100 transition-colors">Logout</a>
    </div>
  </div>
