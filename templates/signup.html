{% extends "base.html" %}
{% load static %}
{% block title %}Signup | GymEncore{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto my-8">
  <div class="bg-[#161b22] rounded-xl shadow-2xl border border-[#30363d] overflow-hidden">
    
    <div class="bg-[#0d1117]/80 border-b border-[#30363d] p-6 text-center">
      <img src="{% static 'images/favicon.png' %}" alt="GymEncore Logo" class="w-14 h-14 mx-auto mb-3 object-contain drop-shadow-[0_0_10px_rgba(132,204,22,0.3)]">
      <h2 class="text-2xl font-black text-white uppercase tracking-wider">Join GymEncore</h2>
    </div>
    
    <div class="p-6 space-y-4">
      <div id="successMsg" class="hidden bg-emerald-950/60 border border-emerald-700 text-emerald-300 px-4 py-3 rounded-lg text-sm font-medium">
        ✅ Account created! Redirecting...
      </div>
      <div id="errorMsg" class="hidden bg-rose-950/60 border border-rose-800 text-rose-300 px-4 py-3 rounded-lg text-sm font-medium"></div>

      <form id="signupForm" method="post" action="{% url 'signup' %}" class="space-y-4">
        {% csrf_token %}

        <!-- Role Selector -->
        <div class="bg-[#0d1117] p-3 rounded-lg border border-[#30363d]">
          <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Account Type</label>
          <div class="flex items-center space-x-6">
            <label class="inline-flex items-center text-sm font-semibold text-slate-200 cursor-pointer">
              <input type="radio" name="role" value="MEMBER" checked onchange="toggleRoleFields('MEMBER')" class="accent-lime-500">
              <span class="ml-2">Member</span>
            </label>
            <label class="inline-flex items-center text-sm font-semibold text-slate-200 cursor-pointer">
              <input type="radio" name="role" value="INSTRUCTOR" onchange="toggleRoleFields('INSTRUCTOR')" class="accent-lime-500">
              <span class="ml-2">Instructor</span>
            </label>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">First Name</label>
            <input type="text" name="first_name" required class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-lg text-white focus:ring-2 focus:ring-lime-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Last Name</label>
            <input type="text" name="last_name" required class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-lg text-white focus:ring-2 focus:ring-lime-500 focus:outline-none">
          </div>
        </div>

        <!-- Gender -->
        <div>
          <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Gender</label>
          <div class="flex space-x-6">
            <label class="inline-flex items-center text-sm text-slate-300"><input type="radio" name="gender" value="MALE" required class="accent-lime-500"><span class="ml-2">Male</span></label>
            <label class="inline-flex items-center text-sm text-slate-300"><input type="radio" name="gender" value="FEMALE" class="accent-lime-500"><span class="ml-2">Female</span></label>
            <label class="inline-flex items-center text-sm text-slate-300"><input type="radio" name="gender" value="OTHER" class="accent-lime-500"><span class="ml-2">Other</span></label>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Email</label>
          <input type="email" name="email" required class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-lg text-white focus:ring-2 focus:ring-lime-500 focus:outline-none">
        </div>

        <div>
          <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Phone Number</label>
          <input type="text" name="phone_number" placeholder="0712345678" required class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-lg text-white focus:ring-2 focus:ring-lime-500 focus:outline-none">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Password</label>
            <input type="password" name="password" required class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-lg text-white focus:ring-2 focus:ring-lime-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Confirm Password</label>
            <input type="password" name="confirm_password" required class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-lg text-white focus:ring-2 focus:ring-lime-500 focus:outline-none">
          </div>
        </div>

        <!-- Member Fields -->
        <div id="memberFields" class="space-y-4">
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Workout Preference</label>
            <select name="workout_time" class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-lg text-white focus:ring-2 focus:ring-lime-500 focus:outline-none">
              <option value="MORNING">Morning</option>
              <option value="AFTERNOON">Afternoon</option>
              <option value="EVENING">Evening</option>
              <option value="NIGHT">Night</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Subscription Plan</label>
            <select name="subscription_plan" class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-lg text-white focus:ring-2 focus:ring-lime-500 focus:outline-none">
              <option value="DAILY">Daily (400 KSH)</option>
              <option value="WEEKLY">Weekly (1,000 KSH)</option>
              <option value="MONTHLY">Monthly (3,000 KSH)</option>
              <option value="BIANNUAL">Bi-Annual (16,000 KSH)</option>
              <option value="YEARLY">Yearly (30,000 KSH)</option>
            </select>
          </div>
        </div>

        <!-- Instructor Fields -->
        <div id="instructorFields" class="hidden space-y-4">
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Specialization</label>
            <select name="specialization" class="w-full px-3 py-2 bg-[#0d1117] border border-[#30363d] rounded-lg text-white focus:ring-2 focus:ring-lime-500 focus:outline-none">
              <option value="WEIGHTLIFTING">Weightlifting</option>
              <option value="CARDIO">Cardiovascular Training</option>
              <option value="HIIT">HIIT</option>
              <option value="CROSSFIT">CrossFit</option>
            </select>
          </div>
        </div>

        <button type="submit" class="w-full bg-lime-500 hover:bg-lime-600 text-black font-black uppercase tracking-wider py-3 rounded-lg transition-all shadow-lg shadow-lime-500/20 cursor-pointer">
          Create Account
        </button>
      </form>
    </div>
  </div>
</div>

<script>
  function toggleRoleFields(role) {
    if (role === 'INSTRUCTOR') {
      document.getElementById('memberFields').classList.add('hidden');
      document.getElementById('instructorFields').classList.remove('hidden');
    } else {
      document.getElementById('memberFields').classList.remove('hidden');
      document.getElementById('instructorFields').classList.add('hidden');
    }
  }

  document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const pass = document.querySelector("input[name='password']").value;
    const confirmPass = document.querySelector("input[name='confirm_password']").value;
    const strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

    const err = document.getElementById("errorMsg");

    if (pass !== confirmPass) {
      err.innerText = "❌ Passwords do not match.";
      err.classList.remove("hidden");
      return;
    }
    if (!strongRegex.test(pass)) {
      err.innerText = "❌ Password must be at least 8 characters, include upper/lower, number & special char.";
      err.classList.remove("hidden");
      return;
    }

    document.getElementById("successMsg").classList.remove("hidden");
    err.classList.add("hidden");
    setTimeout(() => e.target.submit(), 600);
  });
</script>
{% endblock %}
