{% extends "base_member.html" %}
{% load static %}

{% block title %}My Sessions | GymEncore{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto my-8 space-y-6">
  
  <!-- Header -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-[#161b22] p-6 rounded-xl border border-[#30363d]">
    <div>
      <h1 class="text-2xl md:text-3xl font-black text-white uppercase tracking-wider">My Workout Sessions</h1>
      <p class="text-xs text-slate-400 mt-1">Track and manage your upcoming schedule</p>
    </div>
    <span class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-lime-500/10 border border-lime-500/30 text-lime-400 text-xs font-bold uppercase tracking-widest">
      <span class="w-2 h-2 rounded-full bg-lime-400 animate-pulse"></span> Live Schedule
    </span>
  </div>

  <!-- Calendar Container -->
  <div class="bg-[#161b22] p-6 rounded-xl border border-[#30363d] shadow-2xl">
    <div id="calendar" class="min-h-[500px] text-slate-200"></div>
  </div>

</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/bundle.js' %}"></script>
{% endblock %}
