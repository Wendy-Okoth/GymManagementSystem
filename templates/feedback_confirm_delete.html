{% extends "base_member.html" %}
{% block content %}
<div class="max-w-md mx-auto my-12 bg-[#161b22] p-6 rounded-xl shadow-2xl border border-[#30363d]">
  <h2 class="text-2xl font-black text-rose-500 mb-2 uppercase tracking-wide">Delete Feedback</h2>
  <p class="text-slate-400 mb-4 text-sm">Are you sure you want to permanently remove this entry?</p>
  
  <div class="bg-[#0d1117] border border-[#30363d] rounded-lg p-4 mb-6 text-sm text-slate-300">
    <strong class="text-white font-bold block mb-1">{{ feedback.instructor }}</strong> 
    <span class="text-slate-400">"{{ feedback.comment }}"</span>
  </div>

  <form method="post" class="flex items-center space-x-3">
    {% csrf_token %}
    <button type="submit" class="bg-rose-600 hover:bg-rose-700 text-white font-black py-2.5 px-5 rounded-lg transition-all uppercase tracking-wider text-xs shadow-lg shadow-rose-600/20 cursor-pointer">
      Yes, Delete
    </button>
    <a href="{% url 'feedback_list' %}" class="border border-[#30363d] text-slate-300 hover:bg-[#0d1117] font-semibold py-2.5 px-5 rounded-lg transition-colors text-xs uppercase tracking-wider">
      Cancel
    </a>
  </form>
</div>
{% endblock %}
