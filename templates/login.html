{% extends "base.html" %}
{% load static %}
{% block title %}Login | GymEncore{% endblock %}

{% block content %}
<div class="max-w-md mx-auto my-12">
  <div class="bg-[#161b22] rounded-xl shadow-2xl border border-[#30363d] overflow-hidden">
    
    <!-- Card Header -->
    <div class="bg-[#0d1117]/80 border-b border-[#30363d] p-6 text-center">
      <img src="{% static 'images/favicon.png' %}" alt="GymEncore Logo" class="w-14 h-14 mx-auto mb-3 object-contain drop-shadow-[0_0_10px_rgba(132,204,22,0.3)]">
      <h2 class="text-2xl font-black tracking-tight text-white">System Access</h2>
      <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest font-semibold">Enter your credentials</p>
    </div>

    <!-- Card Body -->
    <div class="p-6">
      {% if error %}
        <div class="mb-4 bg-rose-950/50 border border-rose-800 text-rose-300 px-4 py-3 rounded-lg text-sm font-medium">
          ⚠️ {{ error }}
        </div>
      {% endif %}

      <form method="post" action="{% url 'login' %}" class="space-y-5">
        {% csrf_token %}
        <div>
          <label for="loginEmail" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Email Address</label>
          <input type="email" id="loginEmail" name="email" placeholder="member@gymencore.com" required 
            class="w-full px-4 py-3 bg-[#0d1117] border border-[#30363d] rounded-lg text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent transition-all">
        </div>

        <div>
          <label for="loginPassword" class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Password</label>
          <input type="password" id="loginPassword" name="password" placeholder="••••••••" required 
            class="w-full px-4 py-3 bg-[#0d1117] border border-[#30363d] rounded-lg text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-lime-500 focus:border-transparent transition-all">
        </div>

        <button type="submit" class="w-full bg-lime-500 hover:bg-lime-600 text-black font-black uppercase tracking-wider py-3 px-4 rounded-lg transition-all shadow-lg shadow-lime-500/20 active:scale-[0.99] cursor-pointer">
          Login
        </button>
      </form>

      <div class="mt-6 text-center border-t border-[#30363d] pt-4">
        <p class="text-sm text-slate-400">
          Don't have an account? 
          <a href="{% url 'signup' %}" class="font-bold text-lime-400 hover:text-lime-300 transition-colors">Sign Up Here</a>
        </p>
      </div>
    </div>

  </div>
</div>
{% endblock %}
